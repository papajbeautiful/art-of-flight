<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>theARTofFLIGHT</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300F0FF' d='M12 3l-5 16 5-5 5 5z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="rippleLayer"><canvas id="rippleCanvas"></canvas></div>
  <div id="waveLayer"><canvas id="waveCanvas"></canvas></div>
  <div id="mapContainer"></div>
  <div id="departuresLayer">
    <div class="board-frame">
      <div class="board-header">
        <span class="board-title">DEPARTURES&nbsp;&amp;&nbsp;ARRIVALS</span>
        <span class="board-subtitle">LIVE&nbsp;AIRSPACE</span>
      </div>
      <div class="board-legend">
        <span class="board-cell board-callsign">FLIGHT</span>
        <span class="board-cell board-airline">OPERATOR</span>
        <span class="board-cell board-route">ROUTE</span>
        <span class="board-cell board-alt">ALT</span>
        <span class="board-cell board-spd">SPD</span>
        <span class="board-cell board-status">STATUS</span>
      </div>
      <div id="departuresBoard" class="board-rows"></div>
      <div class="board-empty" style="display: none;">— NO AIRCRAFT IN RANGE —</div>
    </div>
  </div>
  <canvas id="canvas"></canvas>

  <!-- Signal-Lost Overlay (shown when flight data stops flowing) -->
  <div id="signalOverlay" class="signal-overlay hidden" role="status">
    <div class="signal-title">Listening for aircraft</div>
    <div class="signal-detail" id="signalDetail"></div>
  </div>

  <!-- Quiet chrome: title fades with idle; pill is the only pointer entry -->
  <div class="ui-overlay" id="uiOverlay">
    <div class="app-title">theARTofFLIGHT</div>
    <button id="hintPill" class="hint-pill" aria-label="Open settings">
      <kbd>S</kbd><span>settings</span><i></i><kbd>1–0</kbd><span>modes</span><i></i><kbd>I</kbd><span>info</span>
    </button>
  </div>

  <!-- Mode toast (keyboard mode switches) -->
  <div id="modeToast" class="mode-toast" aria-hidden="true"></div>

  <!-- Info Overlay -->
  <div id="infoOverlay" class="info-overlay hidden">
    <div class="info-header">
      <h2>DATA</h2>
      <p id="statusText">Initializing...</p>
    </div>
    <div id="flightInfo" class="flight-info"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="settings-panel" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-content">
      <div class="settings-header">
        <h2>theARTofFLIGHT</h2>
        <nav class="settings-nav" id="settingsNav"></nav>
        <span id="savedFlash" class="saved-flash" aria-hidden="true">saved</span>
        <button id="closeSettings" class="close-btn" title="Close" aria-label="Close settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body" id="settingsBody"></div>
      <div class="settings-footer">
        <span class="kbd-hints"><kbd>S</kbd> settings <kbd>I</kbd> info <kbd>F</kbd> fullscreen <kbd>1–0</kbd> modes <kbd>←→</kbd> cycle <kbd>Esc</kbd> close</span>
        <button id="resetSettings" class="btn btn-secondary"><span>Reset</span></button>
      </div>
    </div>
  </div>

  <!-- Idle Detection -->
  <script>
    (function() {
      var t;
      function r() {
        document.body.classList.remove('ui-idle');
        clearTimeout(t);
        t = setTimeout(function() { document.body.classList.add('ui-idle'); }, 3000);
      }
      document.addEventListener('mousemove', r);
      document.addEventListener('mousedown', r);
      document.addEventListener('touchstart', r);
      document.addEventListener('keydown', r);
      r();
    })();
  </script>

  <!-- Application Scripts -->
  <script src="/js/positionPredictor.js"></script>
  <script src="/js/coordinateSystem.js"></script>
  <script src="/js/aircraftIcons.js"></script>
  <script src="/js/palettes.js"></script>
  <script src="/js/visualizations/aircraftVisualization.js"></script>
  <script src="/js/visualizations/aurora.js"></script>
  <script src="/js/visualizations/ink.js"></script>
  <script src="/js/visualizations/patterns.js"></script>
  <script src="/js/visualizations/contrails.js"></script>
  <script src="/js/visualizations/ripple.js"></script>
  <script src="/js/visualizations/constellation.js"></script>
  <script src="/js/visualizations/radar.js"></script>
  <script src="/js/visualizations/reality.js"></script>
  <script src="/js/visualizations/map.js"></script>
  <script src="/js/visualizations/departures.js"></script>
  <script src="/js/flightManager.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
