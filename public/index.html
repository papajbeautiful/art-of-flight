<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>theARTofFLIGHT</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2300F0FF' d='M12 3l-5 16 5-5 5 5z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="rippleLayer"><canvas id="rippleCanvas"></canvas></div>
  <div id="gridLayer"><canvas id="gridCanvas"></canvas></div>
  <div id="waveLayer"><canvas id="waveCanvas"></canvas></div>
  <div id="tubesLayer"><canvas id="tubesCanvas"></canvas></div>
  <div id="googleMap"></div>
  <canvas id="canvas"></canvas>

  <!-- Signal-Lost Overlay (shown when flight data stops flowing) -->
  <div id="signalOverlay" class="signal-overlay hidden" role="status">
    <div class="signal-title">Listening for aircraft</div>
    <div class="signal-detail" id="signalDetail"></div>
  </div>

  <!-- UI Overlay -->
  <div class="ui-overlay" id="uiOverlay">
    <div class="app-title">theARTofFLIGHT</div>

    <!-- Settings Button -->
    <button id="settingsBtn" class="settings-btn" title="Configure">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
        <circle cx="9" cy="6" r="2.5" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="12" r="2.5" fill="currentColor" stroke="none"/>
        <circle cx="11" cy="18" r="2.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Mode Selector -->
    <nav class="mode-selector">
      <button class="mode-btn active" data-mode="ripple" title="Ripple Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="2.5"/>
          <circle cx="12" cy="12" r="6" opacity="0.5"/>
          <circle cx="12" cy="12" r="10" opacity="0.25"/>
        </svg>
        <span class="mode-label">Ripple</span>
      </button>
      <button class="mode-btn" data-mode="reality" title="Reality Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3l-5 16 5-5 5 5z"/>
        </svg>
        <span class="mode-label">Reality</span>
      </button>
      <button class="mode-btn" data-mode="birds" title="Grid Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" opacity="0.8"/>
          <rect x="14" y="3" width="7" height="7" opacity="0.4"/>
          <rect x="3" y="14" width="7" height="7" opacity="0.4"/>
          <rect x="14" y="14" width="7" height="7" opacity="0.6"/>
        </svg>
        <span class="mode-label">Grid</span>
      </button>
      <button class="mode-btn" data-mode="constellation" title="Waves Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <path d="M2 6h20"/>
          <path d="M2 10c4-3 8 3 10 0s6-3 10 0"/>
          <path d="M2 14c4 3 8-3 10 0s6 3 10 0"/>
          <path d="M2 18h20"/>
        </svg>
        <span class="mode-label">Waves</span>
      </button>
      <button class="mode-btn" data-mode="tubes" title="Tubes Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M4 4c4 8 8 12 16 16"/>
          <path d="M4 12c4 4 8 4 16 8" opacity="0.6"/>
          <path d="M4 20c4-4 8-8 16-12" opacity="0.3"/>
        </svg>
        <span class="mode-label">Tubes</span>
      </button>
      <button class="mode-btn" data-mode="map" title="Map Mode">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="1"/>
          <line x1="3" y1="12" x2="21" y2="12" opacity="0.3"/>
          <line x1="12" y1="3" x2="12" y2="21" opacity="0.3"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor" opacity="0.6"/>
        </svg>
        <span class="mode-label">Map</span>
      </button>
      <button class="mode-btn" data-mode="patterns" title="Flight Patterns">
        <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <path d="M2 12c4-8 8-8 10 0s6 8 10 0"/>
          <path d="M2 8c4-6 8-6 10 0s6 6 10 0" opacity="0.5"/>
          <path d="M2 16c4-6 8-6 10 0s6 6 10 0" opacity="0.5"/>
        </svg>
        <span class="mode-label">Patterns</span>
      </button>
    </nav>
  </div>

  <!-- Info Overlay -->
  <div id="infoOverlay" class="info-overlay hidden">
    <div class="info-header">
      <h2>DATA</h2>
      <p id="statusText">Initializing...</p>
    </div>
    <div id="flightInfo" class="flight-info"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-content">
      <div class="settings-header">
        <h2>CONFIGURE</h2>
        <button id="closeSettings" class="close-btn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-tabs" id="settingsTabs"></div>
      <div class="settings-tab-content" id="settingsTabContent"></div>
      <div class="settings-actions">
        <button id="saveSettings" class="btn btn-primary"><span>Save</span></button>
        <button id="resetSettings" class="btn btn-secondary"><span>Reset</span></button>
      </div>
    </div>
  </div>

  <!-- Idle Detection -->
  <script>
    (function() {
      var t;
      function r() {
        document.body.classList.remove('ui-idle');
        clearTimeout(t);
        t = setTimeout(function() { document.body.classList.add('ui-idle'); }, 3000);
      }
      document.addEventListener('mousemove', r);
      document.addEventListener('mousedown', r);
      document.addEventListener('touchstart', r);
      r();
    })();
  </script>

  <!-- Application Scripts -->
  <script src="/js/positionPredictor.js"></script>
  <script src="/js/coordinateSystem.js"></script>
  <script src="/js/aircraftIcons.js"></script>
  <script src="/js/visualizations/ripple.js"></script>
  <script src="/js/visualizations/reality.js"></script>
  <script src="/js/visualizations/birds.js"></script>
  <script src="/js/visualizations/constellation.js"></script>
  <script src="/js/visualizations/tubes.js"></script>
  <script src="/js/mapStyles.js"></script>
  <script src="/js/visualizations/map.js"></script>
  <script src="/js/visualizations/patterns.js"></script>
  <script src="/js/flightManager.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
